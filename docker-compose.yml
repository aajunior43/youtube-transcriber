services:
  hub-master:
    build: .
    container_name: hub-master
    restart: unless-stopped
    expose:
      - "8080"
    networks:
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.hub-master.rule=Host(`hub.srv1767486.hstgr.cloud`)"
      - "traefik.http.routers.hub-master.entrypoints=websecure"
      - "traefik.http.routers.hub-master.tls=true"
      - "traefik.http.routers.hub-master.tls.certresolver=letsencrypt"
      - "traefik.http.services.hub-master.loadbalancer.server.port=8080"
      - "traefik.docker.network=traefik-public"

  organizador-relay:
    build:
      context: .
      dockerfile: services/organizador/Dockerfile
    container_name: organizador-relay
    restart: unless-stopped
    expose:
      - "8765"
    networks:
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.organizador-relay.rule=Host(`hub.srv1767486.hstgr.cloud`) && PathPrefix(`/ws`)"
      - "traefik.http.routers.organizador-relay.entrypoints=websecure"
      - "traefik.http.routers.organizador-relay.tls=true"
      - "traefik.http.routers.organizador-relay.tls.certresolver=letsencrypt"
      - "traefik.http.services.organizador-relay.loadbalancer.server.port=8765"
      - "traefik.docker.network=traefik-public"

  subscription-api:
    build:
      context: .
      dockerfile: services/subscription-api/Dockerfile
    container_name: subscription-api
    restart: unless-stopped
    environment:
      DB_HOST: hub-postgres
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME:-hub_master}
      DB_USER: ${DB_USER:-hubmaster}
      DB_PASS: ${DB_PASS:-hubmaster_secret_2026}
    expose:
      - "8766"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - traefik-public

  video-download-api:
    build:
      context: .
      dockerfile: services/video-download-api/Dockerfile
    container_name: video-download-api
    restart: unless-stopped
    expose:
      - "8767"
    networks:
      - traefik-public

  style-extractor-api:
    build:
      context: .
      dockerfile: services/style-extractor-api/Dockerfile
    container_name: style-extractor-api
    restart: unless-stopped
    expose:
      - "8768"
    networks:
      - traefik-public

  transcript-api:
    build:
      context: .
      dockerfile: services/transcript-api/Dockerfile
    container_name: transcript-api
    restart: unless-stopped
    expose:
      - "8771"
    networks:
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.transcript-api.rule=Host(`hub.srv1767486.hstgr.cloud`) && PathPrefix(`/api/transcript`)"
      - "traefik.http.routers.transcript-api.entrypoints=websecure"
      - "traefik.http.routers.transcript-api.tls=true"
      - "traefik.http.routers.transcript-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.transcript-api.loadbalancer.server.port=8771"
      - "traefik.docker.network=traefik-public"

  organizador-api:
    build:
      context: .
      dockerfile: services/organizador-api/Dockerfile
    container_name: organizador-api
    restart: unless-stopped
    expose:
      - "8769"
    networks:
      - traefik-public

  link-stash-api:
    build:
      context: .
      dockerfile: services/link-stash-api/Dockerfile
    container_name: link-stash-api
    restart: unless-stopped
    environment:
      DB_HOST: hub-postgres
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME:-hub_master}
      DB_USER: ${DB_USER:-hubmaster}
      DB_PASS: ${DB_PASS:-hubmaster_secret_2026}
    expose:
      - "8770"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - traefik-public

  postgres:
    image: postgres:16-alpine
    container_name: hub-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-hub_master}
      POSTGRES_USER: ${DB_USER:-hubmaster}
      POSTGRES_PASSWORD: ${DB_PASS:-hubmaster_secret_2026}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-hubmaster} -d ${DB_NAME:-hub_master}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - traefik-public

volumes:
  postgres-data:

networks:
  traefik-public:
    external: true
