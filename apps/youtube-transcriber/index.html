<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Transcritor de Áudio e Vídeo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<style>
:root {
  --primary: #e11d48;
  --primary-hover: #be123c;
  --green: #10b981;
  --blue: #3b82f6;
  --bg: #0a0a0f;
  --surface: rgba(255,255,255,0.04);
  --surface-hover: rgba(255,255,255,0.08);
  --border: rgba(255,255,255,0.08);
  --text: #f1f1f6;
  --text-secondary: #9ca3af;
  --radius: 20px;
  --font: 'Inter', system-ui, -apple-system, sans-serif;
  --mono: 'JetBrains Mono', monospace;
  --shadow: 0 8px 32px rgba(0,0,0,0.4);
}

[data-theme="light"] {
  --bg: #f8f9fc;
  --surface: rgba(0,0,0,0.03);
  --surface-hover: rgba(0,0,0,0.06);
  --border: rgba(0,0,0,0.08);
  --text: #1a1a2e;
  --text-secondary: #6b7280;
  --primary: #be123c;
  --primary-hover: #e11d48;
  --shadow: 0 8px 32px rgba(0,0,0,0.08);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  transition: background .3s, color .3s;
  line-height: 1.6;
}

.theme-toggle {
  position: fixed;
  top: 20px;
  right: 20px;
  z-index: 100;
  width: 44px;
  height: 44px;
  border-radius: 14px;
  border: 1px solid var(--border);
  background: var(--surface);
  backdrop-filter: blur(20px);
  color: var(--text);
  font-size: 1.2rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all .2s;
}
.theme-toggle:hover { background: var(--surface-hover); }

.container {
  max-width: 720px;
  margin: 0 auto;
  padding: 32px 20px 80px;
}

.header {
  text-align: center;
  margin-bottom: 32px;
}
.header h1 {
  font-size: 1.75rem;
  font-weight: 800;
  letter-spacing: -0.02em;
  background: linear-gradient(135deg, var(--primary), var(--blue));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.header p {
  color: var(--text-secondary);
  font-size: 0.9rem;
  margin-top: 4px;
}

.input-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  backdrop-filter: blur(20px);
  margin-bottom: 20px;
}
.input-group {
  display: flex;
  gap: 10px;
}
.input-group input {
  flex: 1;
  padding: 14px 18px;
  background: var(--bg);
  border: 1.5px solid var(--border);
  border-radius: 14px;
  color: var(--text);
  font-family: var(--font);
  font-size: 0.95rem;
  transition: border-color .2s;
}
.input-group input:focus {
  outline: none;
  border-color: var(--primary);
}
.input-group input::placeholder {
  color: var(--text-secondary);
  opacity: .6;
}

.upload-zone {
  border: 1.5px dashed var(--border);
  border-radius: 16px;
  padding: 28px 20px;
  text-align: center;
  cursor: pointer;
  transition: border-color .2s, background .2s;
}
.upload-zone:hover, .upload-zone.dragging {
  border-color: var(--primary);
  background: rgba(225,29,72,.06);
}
.upload-zone .upload-icon { font-size: 2rem; margin-bottom: 6px; }
.upload-zone strong { display:block; font-size:.95rem; }
.upload-zone span { color:var(--text-secondary); font-size:.8rem; }
.selected-file {
  margin-top:12px; padding:10px 12px; border-radius:10px;
  background:var(--bg); font-size:.82rem; overflow:hidden;
  text-overflow:ellipsis; white-space:nowrap; display:none;
}
.upload-actions { display:flex; align-items:center; gap:12px; margin-top:14px; }
.upload-actions .btn { flex-shrink:0; }
.upload-progress { flex:1; height:7px; background:var(--border); border-radius:5px; overflow:hidden; display:none; }
.upload-progress div { height:100%; width:0; background:linear-gradient(90deg,var(--primary),var(--blue)); transition:width .15s; }
.media-icon {
  width:100px; min-width:100px; aspect-ratio:1; display:flex; align-items:center;
  justify-content:center; border-radius:14px; background:var(--bg); font-size:2.5rem;
}

.btn {
  padding: 14px 24px;
  border: none;
  border-radius: 14px;
  cursor: pointer;
  font-family: var(--font);
  font-size: 0.95rem;
  font-weight: 600;
  transition: all .2s;
  white-space: nowrap;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.btn:disabled {
  opacity: .5;
  cursor: not-allowed;
}
.btn-primary {
  background: var(--primary);
  color: #fff;
}
.btn-primary:hover:not(:disabled) {
  background: var(--primary-hover);
  transform: translateY(-1px);
}
.btn-secondary {
  background: var(--surface);
  color: var(--text);
  border: 1px solid var(--border);
}
.btn-secondary:hover:not(:disabled) {
  background: var(--surface-hover);
  border-color: var(--primary);
}
.btn-sm {
  padding: 8px 14px;
  font-size: 0.85rem;
  border-radius: 10px;
}

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  backdrop-filter: blur(20px);
  overflow: hidden;
  margin-bottom: 20px;
  display: none;
}
.card.active { display: block; }

.video-header {
  display: flex;
  gap: 16px;
  padding: 20px;
  align-items: flex-start;
}
.video-thumb {
  width: 160px;
  min-width: 160px;
  border-radius: 12px;
  aspect-ratio: 16/9;
  object-fit: cover;
  background: var(--bg);
}
.video-meta { min-width: 0; }
.video-meta h2 {
  font-size: 1rem;
  font-weight: 700;
  line-height: 1.4;
  margin-bottom: 4px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.video-meta .channel {
  font-size: 0.85rem;
  color: var(--text-secondary);
}
.video-meta .views {
  font-size: 0.8rem;
  color: var(--text-secondary);
  margin-top: 2px;
}

.tabs {
  display: flex;
  border-bottom: 1px solid var(--border);
  gap: 0;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}
.tab {
  flex: 1;
  padding: 14px 16px;
  text-align: center;
  font-size: 0.9rem;
  font-weight: 600;
  color: var(--text-secondary);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all .2s;
  white-space: nowrap;
  background: none;
  font-family: var(--font);
}
.tab:hover { color: var(--text); }
.tab.active {
  color: var(--primary);
  border-bottom-color: var(--primary);
}

.tab-content { display: none; padding: 20px; }
.tab-content.active { display: block; }

.lang-bar {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  align-items: center;
  margin-bottom: 16px;
}
.lang-bar label {
  font-size: 0.85rem;
  color: var(--text-secondary);
  font-weight: 500;
}
.lang-bar select {
  padding: 8px 14px;
  background: var(--bg);
  border: 1.5px solid var(--border);
  border-radius: 10px;
  color: var(--text);
  font-family: var(--font);
  font-size: 0.85rem;
  cursor: pointer;
  transition: border-color .2s;
}
.lang-bar select:focus { outline: none; border-color: var(--primary); }

.action-bar {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 16px;
}

.transcript-list {
  max-height: 520px;
  overflow-y: auto;
  scroll-behavior: smooth;
}
.transcript-list::-webkit-scrollbar {
  width: 6px;
}
.transcript-list::-webkit-scrollbar-track {
  background: transparent;
}
.transcript-list::-webkit-scrollbar-thumb {
  background: var(--border);
  border-radius: 3px;
}

.line {
  padding: 8px 12px;
  border-radius: 10px;
  margin-bottom: 3px;
  cursor: pointer;
  transition: background .15s;
  font-size: 0.95rem;
  display: flex;
  gap: 10px;
  align-items: baseline;
}
.line:hover { background: var(--surface-hover); }
.line .time {
  font-family: var(--mono);
  font-size: 0.8rem;
  color: var(--primary);
  font-weight: 600;
  white-space: nowrap;
  min-width: 58px;
  text-align: right;
}
.line .text { flex: 1; }

.line mark {
  background: rgba(225, 29, 72, 0.3);
  color: inherit;
  border-radius: 3px;
  padding: 0 2px;
}

.search-box {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
}
.search-box input {
  flex: 1;
  padding: 10px 14px;
  background: var(--bg);
  border: 1.5px solid var(--border);
  border-radius: 10px;
  color: var(--text);
  font-family: var(--font);
  font-size: 0.9rem;
  transition: border-color .2s;
}
.search-box input:focus { outline: none; border-color: var(--primary); }
.search-count {
  font-size: 0.85rem;
  color: var(--text-secondary);
  margin-bottom: 12px;
}

.info-grid {
  display: grid;
  gap: 12px;
}
.info-item {
  display: flex;
  justify-content: space-between;
  padding: 12px 16px;
  background: var(--bg);
  border-radius: 12px;
  font-size: 0.9rem;
}
.info-item .label { color: var(--text-secondary); font-weight: 500; }
.info-item .value { font-weight: 600; text-align: right; max-width: 60%; word-break: break-all; }
.info-item .value a { color: var(--blue); text-decoration: none; }
.info-item .value a:hover { text-decoration: underline; }

.spinner {
  display: inline-block;
  width: 22px;
  height: 22px;
  border: 2.5px solid var(--border);
  border-top-color: var(--primary);
  border-radius: 50%;
  animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.loading-state {
  text-align: center;
  padding: 48px 20px;
  color: var(--text-secondary);
}
.loading-state .spinner { width: 36px; height: 36px; border-width: 3px; margin-bottom: 12px; }
.loading-state p { font-size: 0.95rem; }

.empty-state {
  text-align: center;
  padding: 40px 20px;
  color: var(--text-secondary);
}

/* Queue */
.queue-section { margin-top: 16px; }
.empty-queue { text-align:center;padding:24px;font-size:0.85rem;color:var(--text-secondary); }
.queue-item {
  display:flex;align-items:center;gap:12px;
  padding:12px 14px;border-radius:14px;
  border:1px solid var(--border);background:var(--surface);
  margin-bottom:8px;position:relative;overflow:hidden;
  transition:all .2s;
}
.queue-item.done { border-color:rgba(16,185,129,0.3);background:rgba(16,185,129,0.05); }
.queue-item.error { border-color:rgba(225,29,72,0.3);background:rgba(225,29,72,0.05); }
.queue-item.downloading { border-color:rgba(59,130,246,0.3); }
.queue-item.transcribing { border-color:rgba(225,29,72,0.3); }
.qi-info { flex:1;min-width:0; }
.qi-title { font-size:0.85rem;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap; }
.qi-status { font-size:0.75rem;color:var(--text-secondary);margin-top:2px; }
.qi-btn.done-btn { border-color:rgba(16,185,129,0.4);color:var(--green); }
.qi-btn.done-btn:hover { background:rgba(16,185,129,0.1); }
.qi-btn {
  padding:6px 14px;border-radius:10px;border:1px solid var(--border);
  background:transparent;color:var(--text);cursor:pointer;
  font-family:var(--font);font-size:0.75rem;font-weight:600;transition:all .2s;flex-shrink:0;
}
.qi-btn:hover { border-color:var(--primary);color:var(--primary); }
.qi-btn.err { border-color:var(--primary);color:var(--primary); }
.qi-progress {
  position:absolute;bottom:0;left:0;right:0;height:3px;
  background:var(--border);border-radius:0 0 14px 14px;overflow:hidden;
}
.qi-bar { height:100%;background:linear-gradient(90deg,var(--primary),var(--blue));transition:width .5s ease;border-radius:0 0 0 14px; }
.empty-state .icon { font-size: 2.5rem; margin-bottom: 8px; }
.empty-state h3 { font-size: 1rem; margin-bottom: 4px; color: var(--text); }
.empty-state p { font-size: 0.9rem; }

.error-box {
  background: rgba(225,29,72,0.1);
  border: 1px solid rgba(225,29,72,0.3);
  border-radius: 14px;
  padding: 14px 18px;
  color: var(--primary);
  font-size: 0.9rem;
  margin-bottom: 16px;
  display: none;
}
.error-box.active { display: block; }

.toast-container {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 999;
  display: flex;
  flex-direction: column;
  gap: 8px;
  align-items: center;
  pointer-events: none;
}
.toast {
  background: var(--surface);
  border: 1px solid var(--border);
  backdrop-filter: blur(24px);
  border-radius: 14px;
  padding: 12px 20px;
  font-size: 0.9rem;
  font-weight: 500;
  color: var(--text);
  box-shadow: var(--shadow);
  animation: toastIn .3s ease;
  pointer-events: auto;
  display: flex;
  align-items: center;
  gap: 8px;
}
.toast.out { animation: toastOut .25s ease forwards; }
@keyframes toastIn {
  from { opacity:0; transform:translateY(12px) scale(.95); }
  to { opacity:1; transform:translateY(0) scale(1); }
}
@keyframes toastOut {
  from { opacity:1; transform:translateY(0) scale(1); }
  to { opacity:0; transform:translateY(12px) scale(.95); }
}

.footer {
  text-align: center;
  padding: 32px 20px;
  color: var(--text-secondary);
  font-size: 0.85rem;
}
.footer strong { color: var(--text); }

@media (max-width: 560px) {
  .container { padding: 20px 16px 60px; }
  .header h1 { font-size: 1.35rem; }
  .input-group { flex-direction: column; }
  .input-group .btn { justify-content: center; }
  .video-header { flex-direction: column; }
  .video-thumb { width: 100%; min-width: auto; aspect-ratio: 16/9; }
  .tabs { gap: 0; }
  .tab { font-size: 0.8rem; padding: 12px 10px; }
  .tab-content { padding: 16px; }
  .action-bar .btn { flex: 1; justify-content: center; }
  .line { font-size: 0.88rem; padding: 7px 10px; }
  .line .time { min-width: 50px; font-size: 0.75rem; }
  .theme-toggle { top: 12px; right: 12px; width: 40px; height: 40px; }
}
</style>
</head>
<body>

<button class="theme-toggle" id="themeToggle" aria-label="Alternar tema">🌙</button>

<div class="container">
  <div class="header">
    <h1>Transcritor de Áudio e Vídeo</h1>
    <p>Envie um arquivo e receba a transcrição automaticamente</p>
  </div>

  <div class="input-card">
    <input type="file" id="fileInput" hidden accept="audio/*,video/*,.mkv,.flac,.opus" />
    <div class="upload-zone" id="uploadZone" onclick="$('fileInput').click()">
      <div class="upload-icon">⬆</div>
      <strong>Selecione ou arraste um arquivo</strong>
      <span>Áudio ou vídeo, até 500 MB e 20 minutos</span>
    </div>
    <div class="selected-file" id="selectedFile"></div>
    <div class="upload-actions">
      <button class="btn btn-primary" id="btnUpload" onclick="uploadFile()" disabled>Enviar e transcrever</button>
      <div class="upload-progress" id="uploadProgress"><div id="uploadBar"></div></div>
    </div>
  </div>

  <div class="error-box" id="errorBox"></div>

  <!-- Queue status bar -->
  <div class="card" id="queueSection" style="display:none">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
      <span style="font-size:0.8rem;font-weight:600;color:var(--text-secondary);display:flex;align-items:center;gap:6px">
        <span id="queueStatusIcon">⏳</span>
        <span id="queueStatusText">Processando…</span>
      </span>
      <span style="font-size:0.7rem;color:var(--text-muted);font-family:var(--mono)" id="queueCount">0 arquivos</span>
    </div>
    <div id="queueList">
      <div class="empty-queue">Nenhum arquivo na fila</div>
    </div>
  </div>

  <div class="card" id="videoCard">
    <div class="video-header">
      <div class="media-icon" id="mediaIcon">🎧</div>
      <div class="video-meta">
        <h2 id="videoTitle"></h2>
        <div class="channel" id="videoChannel"></div>
        <div class="views" id="videoViews"></div>
      </div>
    </div>
  </div>

  <div class="card" id="resultCard">
    <div class="tabs" id="tabs">
      <button class="tab active" id="tabTranscriptBtn" data-tab="transcript">📄 Transcrição</button>
      <button class="tab" data-tab="queue" onclick="renderQueue()">📋 Fila</button>
      <button class="tab" data-tab="search">🔍 Buscar</button>
      <button class="tab" data-tab="info">ℹ️ Info</button>
    </div>

    <div class="tab-content active" id="tabTranscript">
      <div id="transcriptActions" style="display:none" class="action-bar">
        <button class="btn btn-secondary btn-sm" onclick="doCopyAll()">📋 Copiar</button>
        <button class="btn btn-secondary btn-sm" onclick="doDownloadTxt()">⬇ Download TXT</button>
      </div>
      <div class="transcript-list" id="transcriptList"></div>
    </div>

    <div class="tab-content" id="tabQueue">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
        <div style="font-size:0.85rem;color:var(--text-secondary)" id="queueInfo"></div>
      </div>
      <div id="queueList"></div>
    </div>

    <div class="tab-content" id="tabSearch">
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="Buscar na transcrição…" autocomplete="off" />
        <button class="btn btn-secondary btn-sm" onclick="doSearch()">Buscar</button>
      </div>
      <div class="search-count" id="searchCount"></div>
      <div class="transcript-list" id="searchResults"></div>
    </div>

    <div class="tab-content" id="tabInfo">
      <div class="info-grid" id="infoGrid"></div>
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<div class="footer">
  Dev <strong>Aleksandro Alves</strong>
</div>

<script>
const $ = id => document.getElementById(id);
const API = '/api/transcript';
let pollTimer = null;
let state = { videoId:'', title:'', source:'upload', segments:[] };
let selectedUpload = null;

function toast(msg, icon = '') {
  const el = document.createElement('div');
  el.className = 'toast';
  el.innerHTML = icon ? `<span>${icon}</span> ${esc(msg)}` : esc(msg);
  $('toastContainer').appendChild(el);
  setTimeout(() => { el.classList.add('out'); setTimeout(() => el.remove(), 260); }, 2200);
}
function esc(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }

function extractVideoId(url) {
  const p = [/youtube\.com\/watch\?v=([\w-]{11})/, /youtu\.be\/([\w-]{11})/, /youtube\.com\/embed\/([\w-]{11})/, /youtube\.com\/shorts\/([\w-]{11})/];
  for (const r of p) { const m = url.match(r); if (m) return m[1]; }
  return null;
}
function fmtTime(sec) {
  sec = Math.floor(sec); const m = Math.floor(sec / 60); const s = sec % 60;
  return `${m}:${String(s).padStart(2,'0')}`;
}

const STATUS_ICON = { queued:'⏳', preparing:'⚙', transcribing:'🎤', saving:'💾', done:'✅', error:'❌' };

/* Queue system */
function renderQueue() {
  fetch(`${API}/status`).then(r => r.json()).then(data => {
    const el = $('queueList');
    const jobs = data.jobs || [];
    const running = jobs.find(j => ['queued','preparing','transcribing','saving'].includes(j.status));

    // Update queue status bar
    if (jobs.length > 0) {
      $('queueSection').style.display = 'block';
      const active = jobs.find(j => ['queued','preparing','transcribing','saving'].includes(j.status));
      if (active) {
        $('queueStatusIcon').textContent = active.status === 'saving' ? '💾' : active.status === 'transcribing' ? '🎤' : active.status === 'preparing' ? '⚙' : '⏳';
        $('queueStatusText').textContent = active.status === 'saving' ? 'Salvando no banco…' : active.status === 'transcribing' ? 'Transcrevendo…' : active.status === 'preparing' ? 'Preparando mídia…' : 'Na fila…';
      } else {
        $('queueStatusIcon').textContent = '✅';
        $('queueStatusText').textContent = 'Todos concluídos';
      }
      $('queueCount').textContent = `${jobs.length} arquivo${jobs.length !== 1 ? 's' : ''}`;
    } else {
      $('queueSection').style.display = 'none';
    }

    if (jobs.length === 0) {
      el.innerHTML = '<div class="empty-queue">Nenhum arquivo na fila</div>';
      return;
    }

    el.innerHTML = jobs.map((j, i) => {
      const statusIcon = STATUS_ICON[j.status] || '⏳';
      let statusText = j.status === 'queued' ? `Na fila (#${i+1})` :
                       j.status === 'preparing' ? 'Preparando mídia…' :
                       j.status === 'transcribing' ? 'Transcrevendo…' :
                       j.status === 'saving' ? 'Salvando no banco…' :
                       j.status === 'done' ? '✅ Concluído' : '❌ Erro';
      return `<div class="queue-item ${j.status}">
        <div class="qi-info">
          <div class="qi-title">${esc(j.title || j.videoId)}</div>
          <div class="qi-status">${statusIcon} ${statusText}</div>
        </div>
        ${j.status === 'done' ? `<button class="qi-btn done-btn" onclick="showResult('${j.id}')">Ver</button>` : ''}
        ${j.status === 'error' ? `<button class="qi-btn err" onclick="showResult('${j.id}')">${esc(j.error?.substring(0,30) || 'Erro')}</button>` : ''}
        ${['queued','preparing','transcribing','saving'].includes(j.status) ?
          `<div class="qi-progress"><div class="qi-bar" style="width:${j.progress}%"></div></div>` : ''}
      </div>`;
    }).join('');
    if (running) startPolling();
  }).catch(() => {});
}

function startPolling() {
  if (pollTimer) clearTimeout(pollTimer);
  pollTimer = setTimeout(renderQueue, 2000);
}

function chooseFile(file) {
  hideError();
  if (!file) return;
  if (file.size > 500 * 1024 * 1024) { showError('Arquivo muito grande. Máximo: 500 MB.'); return; }
  selectedUpload = file;
  $('selectedFile').textContent = `${file.name} · ${(file.size / 1024 / 1024).toFixed(1)} MB`;
  $('selectedFile').style.display = 'block';
  $('btnUpload').disabled = false;
}

function uploadFile() {
  if (!selectedUpload) { showError('Selecione um arquivo de áudio ou vídeo.'); return; }
  hideError();
  const form = new FormData();
  form.append('file', selectedUpload);
  const xhr = new XMLHttpRequest();
  $('btnUpload').disabled = true;
  $('btnUpload').textContent = 'Enviando…';
  $('uploadProgress').style.display = 'block';
  xhr.upload.onprogress = e => {
    if (e.lengthComputable) $('uploadBar').style.width = `${Math.round(e.loaded / e.total * 100)}%`;
  };
  xhr.onload = () => {
    let data = {};
    try { data = JSON.parse(xhr.responseText); } catch (_) {}
    if (xhr.status < 200 || xhr.status >= 300) {
      showError(data.error || 'Falha ao enviar o arquivo.');
      resetUploadButton(false);
      return;
    }
    toast(`Arquivo adicionado à fila! Posição: ${data.position}`, '📋');
    selectedUpload = null;
    $('fileInput').value = '';
    $('selectedFile').style.display = 'none';
    resetUploadButton(true);
    $('queueSection').style.display = 'block';
    renderQueue();
  };
  xhr.onerror = () => { showError('Erro de conexão durante o envio.'); resetUploadButton(false); };
  xhr.open('POST', `${API}/upload`);
  xhr.send(form);
}

function resetUploadButton(clearSelection) {
  $('btnUpload').textContent = 'Enviar e transcrever';
  $('btnUpload').disabled = clearSelection || !selectedUpload;
  $('uploadProgress').style.display = 'none';
  $('uploadBar').style.width = '0';
}

async function showResult(jobId) {
  const res = await fetch(`${API}/status?jobId=${jobId}`);
  const job = await res.json();
  if (!job || job.status === 'error') {
    $('tabTranscriptBtn').click();
    $('transcriptList').innerHTML = `<div class="empty-state"><div class="icon">❌</div><h3>Erro</h3><p>${esc(job?.error || 'Falha desconhecida')}</p></div>`;
    $('transcriptActions').style.display = 'none';
    return;
  }
  window.scrollTo({ top: 0, behavior: 'smooth' });
  if (job.segments && job.segments.length > 0) {
    $('videoCard').classList.add('active');
    $('resultCard').classList.add('active');
    $('videoTitle').textContent = job.title || job.videoId;
    $('mediaIcon').textContent = /\.(mp4|mov|mkv|avi|webm|mpeg|mpg)$/i.test(job.filename || '') ? '🎬' : '🎧';
    $('videoChannel').textContent = '';

    state = { videoId: job.videoId, title: job.title || '', source:job.source || 'upload', channel: '', segments: job.segments };

    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    $('tabTranscriptBtn').classList.add('active');
    $('tabTranscript').classList.add('active');
    renderTranscript();
    toast('Transcrição concluída!', '✅');
  }
}

function renderTranscript() {
  const list = $('transcriptList');
  list.innerHTML = state.segments.map(s => {
    const click = state.source === 'youtube' ? `onclick="jumpTo('${state.videoId}',${s.start})"` : '';
    return `<div class="line" ${click}>
      <span class="time">${fmtTime(s.start)}</span>
      <span class="text">${esc(s.text)}</span>
    </div>`;
  }).join('');
  $('transcriptActions').style.display = 'flex';
}

function jumpTo(vid, sec) { window.open(`https://www.youtube.com/watch?v=${vid}&t=${Math.floor(sec)}`, '_blank'); }

function doCopyAll() {
  const text = state.segments.map(s => `[${fmtTime(s.start)}] ${s.text}`).join('\n');
  navigator.clipboard.writeText(text).then(() => toast('Copiado!', '📋')).catch(() => toast('Erro', '✗'));
}

function doDownloadTxt() {
  const text = state.segments.map(s => `[${fmtTime(s.start)}] ${s.text}`).join('\n');
  const blob = new Blob([text], { type: 'text/plain' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `transcript-${state.videoId}.txt`;
  a.click();
  URL.revokeObjectURL(a.href);
  toast('Download!', '⬇');
}

function doSearch() {
  const q = $('searchInput').value.trim().toLowerCase();
  const list = $('searchResults');
  const count = $('searchCount');
  if (!q || !state.segments.length) { list.innerHTML = ''; count.textContent = ''; return; }
  const matches = state.segments.filter(s => s.text.toLowerCase().includes(q));
  count.textContent = `${matches.length} resultado${matches.length !== 1 ? 's' : ''}`;
  list.innerHTML = matches.length === 0
    ? '<div class="empty-state"><div class="icon">🔍</div><p>Nenhum resultado</p></div>'
    : matches.map(s => {
        const re = new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
        return `<div class="line">
          <span class="time">${fmtTime(s.start)}</span>
          <span class="text">${esc(s.text).replace(re, '<mark>\$1</mark>')}</span>
        </div>`;
      }).join('');
}

function showError(msg) { const e = $('errorBox'); e.textContent = msg; e.classList.add('active'); }
function hideError() { $('errorBox').classList.remove('active'); }

// Tabs
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    tab.classList.add('active');
    const tn = tab.dataset.tab;
    const id = 'tab' + tn.charAt(0).toUpperCase() + tn.slice(1);
    $(id).classList.add('active');
    if (tn === 'info' && state.segments) buildInfo();
    if (tn === 'search') $('searchInput').focus();
  });
});

function buildInfo() {
  const d = state.segments?.length > 0 ? fmtTime(state.segments[state.segments.length-1].end || 0) : '—';
  const items = [
    {l:'Título', v:state.title || '—'},
    {l:'Segmentos', v:String(state.segments?.length || 0)},
    {l:'Duração', v:d}
  ];
  $('infoGrid').innerHTML = items.map(i => `<div class="info-item"><span class="label">${i.l}</span><span class="value">${i.v}</span></div>`).join('');
}

// Theme
function setTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  localStorage.setItem('yt-transcriber-theme', t);
  $('themeToggle').textContent = t === 'dark' ? '🌙' : '☀️';
}
const saved = localStorage.getItem('yt-transcriber-theme');
if (saved) setTheme(saved);
$('themeToggle').addEventListener('click', () => setTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'));

$('fileInput').addEventListener('change', e => chooseFile(e.target.files[0]));
const uploadZone = $('uploadZone');
['dragenter','dragover'].forEach(name => uploadZone.addEventListener(name, e => { e.preventDefault(); uploadZone.classList.add('dragging'); }));
['dragleave','drop'].forEach(name => uploadZone.addEventListener(name, e => { e.preventDefault(); uploadZone.classList.remove('dragging'); }));
uploadZone.addEventListener('drop', e => chooseFile(e.dataTransfer.files[0]));

let searchTimer;
$('searchInput').addEventListener('input', () => { clearTimeout(searchTimer); searchTimer = setTimeout(doSearch, 300); });

// Init
$('tabTranscriptBtn').addEventListener('click', () => {});
$('transcriptList').innerHTML = '<div class="empty-state"><div class="icon">🎬</div><h3>Transcritor de mídia</h3><p>Envie um áudio ou vídeo para começar.</p></div>';
renderQueue();
</script>
</body>
</html>
